<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slither P2P - Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');
        body { background-color: #05070a; margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        canvas { display: block; }
        .font-game { font-family: 'Fredoka+One', cursive; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="relative select-none">

    <div id="menu" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80">
        <div class="w-full max-w-md glass rounded-[2.5rem] p-10 text-center shadow-2xl">
            <h1 class="text-6xl font-game italic mb-4">slither.p2p</h1>
            
            <div class="space-y-4">
                <input type="text" id="nickInput" placeholder="NICKNAME" class="w-full bg-slate-900 border-2 border-slate-700 rounded-xl py-3 px-4 text-center font-bold text-xl">
                
                <div class="p-4 bg-slate-800/50 rounded-xl border border-slate-700">
                    <p class="text-[10px] text-slate-400 uppercase font-bold mb-2">Room ID (Host ou Conectar)</p>
                    <input type="text" id="roomIdInput" value="sala-secreta-123" class="w-full bg-transparent text-center text-green-400 font-mono text-lg focus:outline-none">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="Game.init(true)" class="bg-blue-600 hover:bg-blue-500 py-4 rounded-xl font-game uppercase">Be Host</button>
                    <button onclick="Game.init(false)" class="bg-green-600 hover:bg-green-500 py-4 rounded-xl font-game uppercase">Join Game</button>
                </div>
            </div>
            <p id="statusMsg" class="mt-4 text-xs text-slate-500 italic">Aguardando ação...</p>
        </div>
    </div>

    <div id="hud" class="hidden pointer-events-none">
        <div class="fixed top-6 left-6 glass px-6 py-2 rounded-full border border-white/10">
            <span id="playerRole" class="text-[10px] font-bold uppercase text-blue-400">P2P</span>
        </div>
        <div class="fixed bottom-10 left-10 glass px-8 py-4 rounded-full">
            <span id="liveScore" class="text-3xl font-game text-green-400">0</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const Game = (() => {
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            let peer, conn;
            let isHost = false;
            let players = {}; // { id: {x, y, angle, nick, color, parts} }
            let foods = [];
            let myId;

            const state = {
                width: window.innerWidth,
                height: window.innerHeight,
                camera: { x: 0, y: 0 },
                mouse: { x: 0, y: 0 }
            };

            function init(hostMode) {
                const nick = document.getElementById('nickInput').value || "Guest";
                const roomId = document.getElementById('roomIdInput').value;
                const status = document.getElementById('statusMsg');
                
                isHost = hostMode;
                status.innerText = isHost ? "Iniciando Host..." : "Conectando ao Host...";

                // Inicializa PeerJS
                // Se for Host, ele tenta usar o RoomID. Se for Cliente, ele gera um ID aleatório.
                peer = new Peer(isHost ? roomId : null);

                peer.on('open', (id) => {
                    myId = id;
                    if (!isHost) {
                        // Cliente: Conecta ao Host usando o RoomID fornecido
                        conn = peer.connect(roomId);
                        setupConnection(conn);
                    } else {
                        status.innerText = "Host Ativo! Aguardando jogadores...";
                        startLocalGame(nick);
                    }
                });

                peer.on('connection', (c) => {
                    // Host recebe conexões
                    setupConnection(c);
                });

                peer.on('error', (err) => {
                    alert("Erro no P2P: " + err.type);
                    location.reload();
                });
            }

            function setupConnection(c) {
                conn = c;
                conn.on('open', () => {
                    document.getElementById('menu').style.display = 'none';
                    document.getElementById('hud').classList.remove('hidden');
                    document.getElementById('playerRole').innerText = isHost ? "HOST" : "CLIENT";
                    
                    if (!isHost) {
                        startLocalGame(document.getElementById('nickInput').value);
                    }

                    // Loop de envio de dados (Network Tick)
                    setInterval(() => {
                        if (conn && conn.open) {
                            conn.send({
                                type: 'update',
                                id: myId,
                                data: players[myId]
                            });
                        }
                    }, 50); // 20hz update rate
                });

                conn.on('data', (data) => {
                    if (data.type === 'update') {
                        players[data.id] = data.data;
                    }
                    if (data.type === 'food_sync' && !isHost) {
                        foods = data.foods;
                    }
                });
            }

            function startLocalGame(nick) {
                document.getElementById('menu').style.display = 'none';
                document.getElementById('hud').classList.remove('hidden');

                // Cria jogador local
                players[myId] = {
                    x: Math.random() * 2000,
                    y: Math.random() * 2000,
                    nick: nick,
                    color: `hsl(${Math.random() * 360}, 70%, 60%)`,
                    parts: Array(10).fill({x: 0, y: 0})
                };

                if (isHost) {
                    for(let i=0; i<100; i++) spawnFood();
                }

                requestAnimationFrame(gameLoop);
            }

            function spawnFood() {
                foods.push({
                    x: Math.random() * 2000,
                    y: Math.random() * 2000,
                    color: `hsl(${Math.random() * 360}, 80%, 50%)`
                });
            }

            function update() {
                const me = players[myId];
                if (!me) return;

                // Movimento local suave
                const dx = state.mouse.x - (state.width / 2);
                const dy = state.mouse.y - (state.height / 2);
                const angle = Math.atan2(dy, dx);

                me.x += Math.cos(angle) * 4;
                me.y += Math.sin(angle) * 4;

                // Atualiza partes do corpo
                me.parts.unshift({x: me.x, y: me.y});
                me.parts.pop();

                // Câmera
                state.camera.x += (me.x - state.width / 2 - state.camera.x) * 0.1;
                state.camera.y += (me.y - state.height / 2 - state.camera.y) * 0.1;

                if (isHost && conn && conn.open) {
                    conn.send({ type: 'food_sync', foods: foods });
                }
            }

            function draw() {
                ctx.fillStyle = "#05070a";
                ctx.fillRect(0, 0, state.width, state.height);

                // Desenha Grid
                ctx.strokeStyle = "#111827";
                for(let x = -state.camera.x % 100; x < state.width; x+=100) {
                    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, state.height); ctx.stroke();
                }

                // Desenha Comida
                foods.forEach(f => {
                    ctx.fillStyle = f.color;
                    ctx.beginPath();
                    ctx.arc(f.x - state.camera.x, f.y - state.camera.y, 4, 0, Math.PI*2);
                    ctx.fill();
                });

                // Desenha todos os jogadores
                Object.keys(players).forEach(id => {
                    const p = players[id];
                    ctx.fillStyle = p.color;
                    p.parts.forEach((part, i) => {
                        ctx.beginPath();
                        ctx.arc(part.x - state.camera.x, part.y - state.camera.y, 10 - (i*0.2), 0, Math.PI*2);
                        ctx.fill();
                    });
                    ctx.fillStyle = "white";
                    ctx.fillText(p.nick, p.x - state.camera.x - 10, p.y - state.camera.y - 20);
                });
            }

            function gameLoop() {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }

            window.addEventListener('mousemove', e => { state.mouse.x = e.clientX; state.mouse.y = e.clientY; });
            window.addEventListener('resize', () => { 
                state.width = canvas.width = window.innerWidth; 
                state.height = canvas.height = window.innerHeight; 
            });
            canvas.width = state.width; canvas.height = state.height;

            return { init };
        })();
    </script>
</body>
</html>
